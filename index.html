<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Batch QR Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Batch QR Code Generator</h1>

    <textarea 
      id="qrInput" 
      placeholder="Enter text or URLs (one per line)"
    ></textarea>

    <div class="controls">
      <button id="generateBtn">Generate QR Codes</button>
      <button id="downloadAllBtn">Download All (ZIP)</button>
    </div>

    <div id="qrContainer"></div>
  </div>

  <!-- QR Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- JSZip for bulk download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
